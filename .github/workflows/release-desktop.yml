name: Desktop Release (Wails)

on:
  push:
    branches: [main]
    paths: ['VERSION']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact_name: omni-money-macos
          - os: windows-latest
            platform: windows/amd64
            artifact_name: omni-money-windows
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: omni-money-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.APP_VERSION }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux: WebKitGTK 依存パッケージ（Ubuntu 24.04+ は 4.1）
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && steps.check_release.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # macOS: Xcode CLT は actions/setup-go で自動設定済み

      - name: Install Wails CLI
        if: steps.check_release.outputs.exists == 'false'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build application
        if: steps.check_release.outputs.exists == 'false'
        shell: bash
        run: |
          TAGS=""
          if [ "$RUNNER_OS" = "Linux" ]; then
            TAGS="-tags webkit2_41"
          fi
          wails build -platform ${{ matrix.platform }} \
            $TAGS \
            -ldflags "-X main.version=${{ env.APP_VERSION }}"

      # macOSの場合: ad-hoc署名 + zip圧縮
      - name: Package macOS app
        if: runner.os == 'macOS' && steps.check_release.outputs.exists == 'false'
        run: |
          cd build/bin
          codesign --force --deep -s - "Omni Money.app"
          zip -r ../../${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.zip "Omni Money.app"

      # Linuxの場合: バイナリをtar.gz圧縮
      - name: Package Linux app
        if: runner.os == 'Linux' && steps.check_release.outputs.exists == 'false'
        run: |
          cd build/bin
          tar czf ../../${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.tar.gz omni_money

      # Windowsの場合: exeをzip圧縮
      - name: Package Windows app
        if: runner.os == 'Windows' && steps.check_release.outputs.exists == 'false'
        shell: pwsh
        run: |
          Compress-Archive -Path "build\bin\omni_money.exe" -DestinationPath "${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.zip"

      - name: Upload artifact
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.APP_VERSION }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Omni Money v${{ env.APP_VERSION }}
          body: |
            ## Omni Money v${{ env.APP_VERSION }}

            ### ダウンロード
            - **macOS**: `omni-money-macos-v${{ env.APP_VERSION }}.zip`
            - **Windows**: `omni-money-windows-v${{ env.APP_VERSION }}.zip`
            - **Linux**: `omni-money-linux-v${{ env.APP_VERSION }}.tar.gz`

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ env.APP_VERSION }}
            ```
          files: dist/**/*
          draft: false
          prerelease: ${{ contains(env.APP_VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
