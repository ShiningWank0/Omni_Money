name: Desktop Release (Wails)

on:
  push:
    branches: [main]
    paths: ['VERSION']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact_name: omni-money-macos
          - os: windows-latest
            platform: windows/amd64
            artifact_name: omni-money-windows
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: omni-money-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.APP_VERSION }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Setup Node.js
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Linux: WebKitGTK 依存パッケージ（Ubuntu 24.04+ は 4.1）
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && steps.check_release.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        if: steps.check_release.outputs.exists == 'false'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build application
        if: steps.check_release.outputs.exists == 'false'
        shell: bash
        run: |
          TAGS=""
          if [ "$RUNNER_OS" = "Linux" ]; then
            TAGS="-tags webkit2_41"
          fi
          wails build -platform ${{ matrix.platform }} \
            $TAGS \
            -ldflags "-X main.version=${{ env.APP_VERSION }}"

      # macOSの場合: ad-hoc署名 + dittoでバンドル構造保持ZIP
      - name: Package macOS app
        if: runner.os == 'macOS' && steps.check_release.outputs.exists == 'false'
        run: |
          cd build/bin
          codesign --force --deep -s - "Omni Money.app"
          codesign --verify --strict "Omni Money.app"
          ditto -c -k --sequesterRsrc --keepParent "Omni Money.app" "../../${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.zip"

      # Linuxの場合: バイナリをtar.gz圧縮
      - name: Package Linux app
        if: runner.os == 'Linux' && steps.check_release.outputs.exists == 'false'
        run: |
          cd build/bin
          tar czf ../../${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.tar.gz omni_money

      # Windowsの場合: exeをzip圧縮
      - name: Package Windows app
        if: runner.os == 'Windows' && steps.check_release.outputs.exists == 'false'
        shell: pwsh
        run: |
          Compress-Archive -Path "build\bin\omni_money.exe" -DestinationPath "${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.zip"

      - name: Upload artifact
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-v${{ env.APP_VERSION }}.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.APP_VERSION }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PRERELEASE_FLAG=""
          if echo "${{ env.APP_VERSION }}" | grep -q '-'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > /tmp/release-notes.md << 'NOTES_EOF'
          ## Omni Money v${{ env.APP_VERSION }}

          ### ダウンロード
          - **macOS (Apple Silicon / Intel)**: `omni-money-macos-v${{ env.APP_VERSION }}.zip`
          - **Windows**: `omni-money-windows-v${{ env.APP_VERSION }}.zip`
          - **Linux**: `omni-money-linux-v${{ env.APP_VERSION }}.tar.gz`

          ### macOS で初回起動する場合
          zipを解凍後、ターミナルで以下を実行してから起動してください：
          ```bash
          xattr -cr "Omni Money.app"
          ```
          または、右クリック →「開く」→「システム設定 > プライバシーとセキュリティ > このまま開く」でも起動できます。

          ### Docker
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ env.APP_VERSION }}
          ```
          NOTES_EOF

          gh release create "v${{ env.APP_VERSION }}" \
            --title "Omni Money v${{ env.APP_VERSION }}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            $(find dist/ -type f)
